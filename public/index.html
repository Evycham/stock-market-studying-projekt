<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Stock Market</title>
    <script src="javascripts/main.js" defer></script>
</head>
<body>
    <h1>Stock Market</h1>
    <p>Eine extrem simple Börsensimulation</p>
    <p><a href="/api-docs">API Docs</a> </p>

    <!--user info-->
    <div id="user-info">
        <p id="user-name"></p>
        <p id="user-balance"></p>
    </div>

    <!--buy/sell-->
    <div id="trade-item">
        <h2 class="titel">Trade-zone</h2>
        <label for="trade-menu">Chose: </label>
        <select id="trade-menu">
            <option value="0">---</option>
        </select>
        <div id="trade">
            <label for="sell-input">Value: </label>
            <input id="sell-input" type="text">
            <button id="sell-button">Sell</button>
            <button id="buy-button">Buy</button>
        </div>
    </div>

    <!--portfolio-->
    <div id="portfolio-items">
        <h2 class="title">Your portfolio</h2>
        <ul id="portfolio-item-list">
            <template id="portfolio-template">
                <li class="portfolio-item">
                    <span class="stock-name"></span>
                    <span class="stock-count"></span>
                </li>
            </template>
        </ul>
        <span id="portfolio-value"></span>
    </div>

    <!--all stocks-->
    <div id="stocks-item">
        <h2 class="title">All stocks</h2>
        <ul id="stocks-item-list">
            <template id="stocks-template">
                <li class="stock-item">
                    <span class="stock-name"></span>
                    <span class="stock-price"></span>
                    <span class="stock-amount"></span>
                </li>
            </template>
        </ul>
    </div>

    <!--all players-->
    <div id="messages-item">
        <h2 class="title">Messages</h2>
        <div id="messages">
            <template>
                <div class="sms">
                    <span class="sender"></span>
                    <span class=""></span>
                </div>
            </template>
        </div>
    </div>

    <!--all players-->
    <div id="top">
        <h2 class="title">Top players</h2>
        <template id="players-template">
            <div class="player-item">
                <span class="rank-column"></span>
                <span class="player-column"></span>
                <span class="value-column"></span>
            </div>
        </template>
    </div>

    <!--news-->
    <div id="news-item">
        <h2 class="title">News</h2>
        <template id="news-template">
            <div class="news">
                <span class="news-text"></span>
                <span class="news-time"></span>
            </div>
        </template>
    </div>

</body>
</html>
